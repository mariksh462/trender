<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRENDER | Register</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #060d05 linear-gradient(135deg, #060d05 0%, #1a2a1a 100%);
            font-family: -apple-system, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(77, 175, 79, 0.2);
        }
        .logo { font-size: 32px; font-weight: 700; text-align: center; margin-bottom: 40px; letter-spacing: 2px; }
        .title { font-size: 28px; font-weight: 700; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbdccb; font-weight: 600; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(77, 175, 79, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus { outline: none; background: rgba(77, 175, 79, 0.1); border-color: #4daf4f; }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #4daf4f;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover:not(:disabled) { background: #3d9a3f; transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.3); color: #ff6b6b; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
        .error.show { display: block; }
        .footer { margin-top: 20px; text-align: center; font-size: 14px; }
        .footer a { color: #4daf4f; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TRENDER</div>
        <div class="title">Create Account</div>
        <div class="error" id="errorMsg"></div>
        
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
        </form>
        
        <div class="footer">
            Already have an account? <a href="index.html">Sign in</a>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        
        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
        
        function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const user = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if (!user || !email || !pass) {
                showError('Please fill in all fields');
                return;
            }
            
            if (pass.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Creating...';
            
            fetch(API + '/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, email: email, password: pass }),
                credentials: 'include'
            })
            .then(r => r.json())
            .then(d => {
                if (d.success) {
                    window.location.href = 'profile.html';
                } else {
                    showError(d.error || 'Registration failed');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            })
            .catch(e => {
                showError('Error: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            });
        }
    </script>
</body>
</html>
