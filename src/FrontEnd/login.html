<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glad to see you again!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="root">
        <header class="header">
            <div class="header_left">
                <div class="logo_container">
                    <div class="logo_bars">
                        <div class="bar bar-1"></div>
                        <div class="bar bar-2"></div>
                        <div class="bar bar-3"></div>
                        <div class="bar bar-4"></div>
                    </div>
                    <div class="logo">TR<span class="green_text">&</span>er</div>
                </div>
            </div>
            <div class="header_right">
                <div class="header_auth">
                    Don't have an account? <a href="index.html" class="auth_link">Sign Up</a>
                </div>
            </div>
        </header>

        <div class="main">
            <h2 class="title" style="filter: blur(0.5px); text-shadow: 0 0 15px rgba(194, 227, 196, 0.5); margin-bottom: 30px;">
                Glad to see you again!
            </h2>
            
            <div class="form">
                <input class="input" type="email" placeholder="example@domain.com" />
                <input class="input" type="password" placeholder="Password" />
                
                <a class="button_link" href="about.html">
                    <button class="button">Log In</button>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
