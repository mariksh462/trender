<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="root">
        <header class="header">
            <div class="header_left">
               
                <div class="logo_container">
                     <div class="logo_bars">
                         <div class="bar bar-1"></div>
                         <div class="bar bar-2"></div>
                         <div class="bar bar-3"></div>
                         <div class="bar bar-4"></div>
                     </div>
                    <div class="logo">TR<span class="green_text">&</span>er</div>
                 </div>
            </div>
                
            <div class="header_right">
                <div class="header_auth">
                    Already have an account? <a href="login.html" class="auth_link">Log In</a>
                </div>
            </div>
        </header>
        <div class="main">
            <h2 class="title">
                Let's get you started!
            </h2>
            <div class="form">
                <input id="u_name" class="input" placeholder="username" />
                <input id="u_login" class="input" placeholder="login" />
                <input id="u_pass" class="input" placeholder="password" />
                <input id="u_conf" class="input" placeholder="confirm password" />
                <a id="target_link" class="button_link" href="about.html">
                    <button class="button">Log In</button>
                </a>

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
